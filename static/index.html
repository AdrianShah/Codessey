<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codessey — Agentic Code Review</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e4e4e7; min-height: 100vh; }
        .header { padding: 1.5rem 2rem; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 1rem; }
        .header h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 70px); }
        .panel { padding: 1.5rem; overflow-y: auto; }
        .panel-left { border-right: 1px solid #27272a; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .tab { padding: 0.5rem 1rem; border-radius: 0.5rem; background: #1f2937; border: 1px solid #374151; cursor: pointer; color: #9ca3af; font-size: 0.875rem; }
        .tab.active { background: #6366f1; color: white; border-color: #6366f1; }
        textarea { width: 100%; height: calc(100% - 120px); background: #1a1b26; border: 1px solid #27272a; border-radius: 0.5rem; padding: 1rem; color: #e4e4e7; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; resize: none; }
        input[type="text"], input[type="file"] { width: 100%; padding: 0.75rem; background: #1a1b26; border: 1px solid #27272a; border-radius: 0.5rem; color: #e4e4e7; margin-bottom: 0.75rem; }
        .btn { padding: 0.75rem 1.5rem; background: #6366f1; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
        .btn:hover { background: #4f46e5; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .report { font-size: 0.9rem; line-height: 1.6; }
        .report h1 { font-size: 1.3rem; margin-bottom: 1rem; }
        .report h2 { font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #a5b4fc; }
        .report h3 { font-size: 0.95rem; margin-top: 1rem; color: #c4b5fd; }
        .report p { margin-bottom: 0.5rem; }
        .report hr { border: none; border-top: 1px solid #27272a; margin: 1rem 0; }
        .report blockquote { border-left: 3px solid #f59e0b; padding-left: 1rem; color: #fbbf24; margin: 0.5rem 0; }
        .loading { display: none; align-items: center; justify-content: center; height: 100%; }
        .loading.active { display: flex; }
        .spinner { width: 2rem; height: 2rem; border: 3px solid #27272a; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #ef4444; padding: 1rem; background: #1a1b26; border-radius: 0.5rem; border: 1px solid #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Codessey</h1>
        <span style="color: #6b7280; font-size: 0.875rem;">Agentic Code Review</span>
    </div>
    <div class="container">
        <div class="panel panel-left">
            <div class="tabs">
                <button class="tab active" data-tab="paste">Paste</button>
                <button class="tab" data-tab="upload">Upload</button>
                <button class="tab" data-tab="url">GitHub URL</button>
            </div>
            <div id="tab-paste">
                <textarea id="code-input" placeholder="Paste your code here..."></textarea>
                <div style="margin-top: 0.75rem;">
                    <button class="btn" id="review-paste-btn">Review Code</button>
                </div>
            </div>
            <div id="tab-upload" class="hidden">
                <input type="file" id="file-input" accept=".py,.js,.ts,.java,.go,.cpp,.c,.h">
                <button class="btn" id="review-upload-btn">Review File</button>
            </div>
            <div id="tab-url" class="hidden">
                <input type="text" id="url-input" placeholder="https://github.com/user/repo/blob/main/file.py">
                <button class="btn" id="review-url-btn">Review URL</button>
            </div>
        </div>
        <div class="panel">
            <div class="loading" id="loading">
                <div style="text-align: center;">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem; color: #6b7280;">Analyzing code...</p>
                </div>
            </div>
            <div class="report" id="report"></div>
            <div class="error hidden" id="error"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
